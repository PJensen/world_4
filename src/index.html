<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>World 4 - ecs-js starter</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #111827;
        color: #f9fafb;
        display: grid;
        place-items: center;
      }

      main {
        width: min(90vw, 900px);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 0.75rem;
        color: #d1d5db;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 1px solid #374151;
        background: #030712;
        display: block;
        touch-action: none;
      }

      #hud {
        margin-top: 0.5rem;
        font-size: 0.95rem;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>World 4 · ecs-js game starter</h1>
      <p>Side-scrolling builder: place houses, farms, and factories with a live World3 overlay.</p>
      <canvas id="game" width="960" height="540" aria-label="Game canvas"></canvas>
      <div id="hud">Starting…</div>
    </main>
    <script type="module" src="./game.js"></script>
  </body>
</html>
