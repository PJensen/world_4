<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Factory at sunset with smoke towers">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b1f5e"/>
      <stop offset="35%" stop-color="#8a3f7c"/>
      <stop offset="68%" stop-color="#f08a5d"/>
      <stop offset="100%" stop-color="#f7c873"/>
    </linearGradient>

    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity="1"/>
      <stop offset="65%" stop-color="#ff9e57" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff9e57" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0a6"/>
      <stop offset="100%" stop-color="#ff9e57"/>
    </linearGradient>

    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3e2b2c"/>
      <stop offset="100%" stop-color="#1c1718"/>
    </linearGradient>

    <linearGradient id="factoryBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b4f5a"/>
      <stop offset="100%" stop-color="#272a31"/>
    </linearGradient>

    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b707b"/>
      <stop offset="100%" stop-color="#32363f"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="smokeBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="700" fill="url(#sky)"/>

  <!-- Sun glow -->
  <circle cx="860" cy="250" r="150" fill="url(#sunGlow)" filter="url(#softBlur)"/>
  <circle cx="860" cy="250" r="82" fill="url(#sun)"/>

  <!-- Distant haze -->
  <ellipse cx="820" cy="390" rx="500" ry="70" fill="#ffb06b" opacity="0.16" filter="url(#softBlur)"/>

  <!-- Ground -->
  <rect x="0" y="500" width="1200" height="200" fill="url(#ground)"/>

  <!-- Distant industrial silhouettes -->
  <g opacity="0.32" fill="#221d22">
    <rect x="60" y="430" width="160" height="70"/>
    <rect x="205" y="445" width="75" height="55"/>
    <rect x="300" y="410" width="120" height="90"/>
    <rect x="520" y="420" width="130" height="80"/>
    <rect x="700" y="435" width="180" height="65"/>
    <rect x="980" y="425" width="100" height="75"/>
    <rect x="150" y="360" width="24" height="140"/>
    <rect x="620" y="340" width="20" height="160"/>
    <rect x="1030" y="350" width="18" height="150"/>
  </g>

  <!-- Main factory -->
  <g>
    <!-- Base structures -->
    <rect x="170" y="370" width="420" height="145" fill="url(#factoryBody)"/>
    <rect x="580" y="405" width="190" height="110" fill="url(#factoryBody)"/>
    <rect x="760" y="385" width="170" height="130" fill="url(#factoryBody)"/>
    <rect x="915" y="420" width="120" height="95" fill="url(#factoryBody)"/>

    <!-- Sawtooth roof -->
    <path d="
      M170 370
      L230 330 L230 370
      L290 330 L290 370
      L350 330 L350 370
      L410 330 L410 370
      L470 330 L470 370
      L530 330 L530 370
      L590 330 L590 515
      L170 515 Z"
      fill="#353943"/>

    <!-- Roof highlights -->
    <g fill="#5f6572" opacity="0.55">
      <polygon points="180,367 230,330 230,370 180,370"/>
      <polygon points="240,367 290,330 290,370 240,370"/>
      <polygon points="300,367 350,330 350,370 300,370"/>
      <polygon points="360,367 410,330 410,370 360,370"/>
      <polygon points="420,367 470,330 470,370 420,370"/>
      <polygon points="480,367 530,330 530,370 480,370"/>
    </g>

    <!-- Smoke towers -->
    <rect x="300" y="180" width="48" height="220" rx="6" fill="url(#tower)"/>
    <rect x="455" y="120" width="58" height="280" rx="6" fill="url(#tower)"/>
    <rect x="845" y="150" width="52" height="255" rx="6" fill="url(#tower)"/>

    <!-- Tower bands -->
    <g fill="#8f95a3" opacity="0.35">
      <rect x="300" y="215" width="48" height="12"/>
      <rect x="300" y="270" width="48" height="12"/>
      <rect x="300" y="325" width="48" height="12"/>

      <rect x="455" y="160" width="58" height="14"/>
      <rect x="455" y="225" width="58" height="14"/>
      <rect x="455" y="290" width="58" height="14"/>
      <rect x="455" y="355" width="58" height="14"/>

      <rect x="845" y="190" width="52" height="13"/>
      <rect x="845" y="255" width="52" height="13"/>
      <rect x="845" y="320" width="52" height="13"/>
    </g>

    <!-- Pipes -->
    <g fill="none" stroke="#2c2f36" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <path d="M590 470 C650 470, 650 455, 690 455"/>
      <path d="M760 455 C800 455, 805 430, 845 430"/>
      <path d="M400 460 C430 460, 430 420, 480 420"/>
    </g>

    <!-- Windows -->
    <g fill="#ffc66d" opacity="0.68">
      <rect x="210" y="405" width="26" height="20"/>
      <rect x="250" y="405" width="26" height="20"/>
      <rect x="290" y="405" width="26" height="20"/>
      <rect x="330" y="405" width="26" height="20"/>
      <rect x="370" y="405" width="26" height="20"/>
      <rect x="410" y="405" width="26" height="20"/>
      <rect x="450" y="405" width="26" height="20"/>
      <rect x="490" y="405" width="26" height="20"/>

      <rect x="210" y="440" width="26" height="20"/>
      <rect x="250" y="440" width="26" height="20"/>
      <rect x="290" y="440" width="26" height="20"/>
      <rect x="330" y="440" width="26" height="20"/>
      <rect x="370" y="440" width="26" height="20"/>
      <rect x="410" y="440" width="26" height="20"/>
      <rect x="450" y="440" width="26" height="20"/>
      <rect x="490" y="440" width="26" height="20"/>

      <rect x="610" y="435" width="24" height="18"/>
      <rect x="645" y="435" width="24" height="18"/>
      <rect x="680" y="435" width="24" height="18"/>

      <rect x="790" y="420" width="28" height="20"/>
      <rect x="830" y="420" width="28" height="20"/>
      <rect x="870" y="420" width="28" height="20"/>
    </g>

    <!-- Doors -->
    <rect x="540" y="445" width="38" height="70" fill="#1e2127"/>
    <rect x="980" y="455" width="30" height="60" fill="#1e2127"/>
  </g>

  <!-- Smoke -->
  <g fill="#5c5f66" opacity="0.42" filter="url(#smokeBlur)">
    <!-- Left tower smoke -->
    <ellipse cx="320" cy="155" rx="34" ry="18"/>
    <ellipse cx="350" cy="135" rx="42" ry="22"/>
    <ellipse cx="390" cy="112" rx="56" ry="30"/>
    <ellipse cx="445" cy="86" rx="76" ry="38"/>
    <ellipse cx="520" cy="62" rx="92" ry="42"/>

    <!-- Center tower smoke -->
    <ellipse cx="484" cy="95" rx="42" ry="20"/>
    <ellipse cx="530" cy="76" rx="56" ry="28"/>
    <ellipse cx="595" cy="55" rx="78" ry="36"/>
    <ellipse cx="690" cy="42" rx="110" ry="44"/>

    <!-- Right tower smoke -->
    <ellipse cx="870" cy="130" rx="38" ry="20"/>
    <ellipse cx="910" cy="110" rx="52" ry="25"/>
    <ellipse cx="970" cy="88" rx="70" ry="32"/>
    <ellipse cx="1055" cy="70" rx="94" ry="40"/>
  </g>

  <!-- Foreground shadow -->
  <rect x="0" y="515" width="1200" height="185" fill="#120f12" opacity="0.28"/>

  <!-- Tiny birds for scale -->
  <g stroke="#2a2030" stroke-width="3" fill="none" opacity="0.45">
    <path d="M150 160 q10 -10 20 0 q10 -10 20 0"/>
    <path d="M210 210 q8 -8 16 0 q8 -8 16 0"/>
  </g>
</svg>
